analyzers:
  ros2_control:
    type: diagnostic_aggregator/AnalyzerGroup
    path: ROS2Control
    analyzers:
      controllers:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Controllers
        contains: ['controller']
      hardware:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Hardware
        contains: ['hardware']
  system:
    type: diagnostic_aggregator/AnalyzerGroup
    path: System
    analyzers:
      cpu:
        type: diagnostic_aggregator/GenericAnalyzer
        path: CPU
        contains: ['cpu']
      memory:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Memory
        contains: ['memory']