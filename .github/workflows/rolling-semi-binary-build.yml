name: Rolling Semi-Binary Build
# description: 'Build & test that compiles the main dependencies from source.'

on:
  workflow_dispatch:
    inputs:
      ref_branch:
        description: 'Branch to run on'
        required: false
        default: 'example_18_ci'
  pull_request: &event
    branches:
      - master
    paths:
      - '**.hpp'
      - '**.cpp'
      - '.github/workflows/rolling-semi-binary-build.yml'
      - '**/package.xml'
      - '**/CMakeLists.txt'
      - '**.xacro'
      - '**.py'
      - '**.yaml'
      - 'ros2_control_demos.rolling.repos'
      - 'ros2_control_demos.kilted.repos'
      - '**.xml'
  push: *event
  schedule:
    # Run every morning to detect flakiness and broken dependencies
    - cron: '33 1 * * MON-FRI'

jobs:
  semi_binary:
    uses: ./.github/workflows/reusable-industrial-ci-with-cache.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - ROS_DISTRO: rolling
            # mujoco_ros2_control is not ready for rolling, so we skip the example_18 package
            ADDITIONAL_COLCON_ARGS: --packages-skip ros2_control_demo_example_18
          - ROS_DISTRO: kilted
            ADDITIONAL_COLCON_ARGS: ''
    with:
      ros_distro: ${{ matrix.ROS_DISTRO }}
      ros_repo: testing
      upstream_workspace: ros2_control_demos.${{ matrix.ROS_DISTRO }}.repos
      ref_for_scheduled_build: master
      additional_colcon_args: ${{ matrix.ADDITIONAL_COLCON_ARGS }}
