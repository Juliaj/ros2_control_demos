controller_manager:
  ros__parameters:
    # Controller update rate.
    # For sim2sim parity with training (sim_dt=0.002, decimation=10), use 50 Hz (0.02s period).
    # Note: PID gains configuration available in open_duck_mini_pids.yaml
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/xmls/open_duck_mini_v2.xml
    # To enable PID control, add pids_config_file parameter to ros2_control xacro
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    state_interfaces_broadcaster:
      type: state_interfaces_broadcaster/StateInterfacesBroadcaster
    motion_controller:
      type: motion_controller/MotionController
    forward_command_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    # Source: Configuration for publishing joint states
    # Publish all controllable joints (legs + head)
    # 14 joints: left leg (5) + head (4) + right leg (5)
    # Joint names match ros2_control xacro: open_duck_mini.ros2_control.xacro
    joints:
      - left_hip_yaw
      - left_hip_roll
      - left_hip_pitch
      - left_knee
      - left_ankle
      - neck_pitch
      - head_pitch
      - head_yaw
      - head_roll
      - right_hip_yaw
      - right_hip_roll
      - right_hip_pitch
      - right_knee
      - right_ankle

state_interfaces_broadcaster:
  ros__parameters:
    interfaces:
      # IMU sensor interfaces (indices 0-9)
      # Source: ros2_control xacro open_duck_mini.ros2_control.xacro sensor name "imu"
      # Sensor name matches MuJoCo site name in open_duck_mini_v2.xml
      # Maps to MuJoCo sensors: framequat (orientation), gyro (angular_velocity), accelerometer (linear_acceleration)
      - imu/orientation.x          # 0
      - imu/orientation.y          # 1
      - imu/orientation.z          # 2
      - imu/orientation.w          # 3
      - imu/angular_velocity.x     # 4 (gyro)
      - imu/angular_velocity.y     # 5 (gyro)
      - imu/angular_velocity.z     # 6 (gyro)
      - imu/linear_acceleration.x  # 7 (accelerometer)
      - imu/linear_acceleration.y  # 8 (accelerometer)
      - imu/linear_acceleration.z  # 9 (accelerometer)
      # Joint position interfaces (indices 10 to 10+N-1)
      # Order: left leg (5), head (4), right leg (5) = 14 joints total
      - left_hip_yaw/position       # 10
      - left_hip_roll/position      # 11
      - left_hip_pitch/position     # 12
      - left_knee/position          # 13
      - left_ankle/position         # 14
      - neck_pitch/position         # 15 (head joint 0)
      - head_pitch/position         # 16 (head joint 1)
      - head_yaw/position           # 17 (head joint 2)
      - head_roll/position          # 18 (head joint 3)
      - right_hip_yaw/position      # 19
      - right_hip_roll/position     # 20
      - right_hip_pitch/position    # 21
      - right_knee/position         # 22
      - right_ankle/position        # 23
      # Joint velocity interfaces (indices 10+N to 10+2N-1)
      # Source: Same joint order as position interfaces above
      - left_hip_yaw/velocity       # 24
      - left_hip_roll/velocity      # 25
      - left_hip_pitch/velocity     # 26
      - left_knee/velocity          # 27
      - left_ankle/velocity         # 28
      - neck_pitch/velocity         # 29 (head joint 0)
      - head_pitch/velocity         # 30 (head joint 1)
      - head_yaw/velocity           # 31 (head joint 2)
      - head_roll/velocity          # 32 (head joint 3)
      - right_hip_yaw/velocity      # 33
      - right_hip_roll/velocity     # 34
      - right_hip_pitch/velocity    # 35
      - right_knee/velocity         # 36
      - right_ankle/velocity        # 37
      # Foot contact sensor interfaces (binary 0/1)
      - left_foot_contact/contact_raw   # 38
      - left_foot_contact/contact       # 39
      - right_foot_contact/contact_raw  # 40
      - right_foot_contact/contact      # 41


motion_controller:
  ros__parameters:
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer_base.py
    # Update rate: 1/(sim_dt * decimation) = 1/(0.002 * 10) = 50 Hz

    # Publish debug topics for observation, action, and motor targets
    enable_debug_publishing: true

    joints:
      - left_hip_yaw       # 0
      - left_hip_roll      # 1
      - left_hip_pitch     # 2
      - left_knee          # 3
      - left_ankle         # 4
      - neck_pitch         # 5 (head joint 0)
      - head_pitch         # 6 (head joint 1)
      - head_yaw           # 7 (head joint 2)
      - head_roll          # 8 (head joint 3)
      - right_hip_yaw      # 9
      - right_hip_roll     # 10
      - right_hip_pitch    # 11
      - right_knee         # 12
      - right_ankle        # 13

    # Model configuration
    model_path: "$(find-pkg-share ros2_control_demo_example_18)/onnx_model/2025_12_26_165635_300482560.onnx"

    # Model input/output dimensions
    # Source: 2025_12_26_165635_300482560.onnx.metadata.json (obs_size, act_size)
    model_input_size: 101   # Observation dimension
    model_output_size: 14   # Action dimension (number of joints)

    # Topics for observation formatting
    interfaces_broadcaster_topic: "state_interfaces_broadcaster/values"
    interfaces_broadcaster_names_topic: "state_interfaces_broadcaster/names"

    # Velocity command topic (custom message type: VelocityCommandWithHead)
    velocity_command_topic: "~/cmd_velocity_with_head"

    # Contact sensor topic for feet contacts
    feet_contact_topic: "~/feet_contacts"

    # Contact sensor consumption/logging (from mujoco_ros2_control contact sensors).
    # if false, we use artificial contacts (phase-based contacts), but logs sensor values for comparison.
    use_contact_sensors: true
    log_contact_sensors: false
    left_contact_sensor_name: "left_foot_contact"
    right_contact_sensor_name: "right_foot_contact"

    # Action processing parameters
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py line 31
    # Scales RL policy output actions before applying to joints
    action_scale: 0.25
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py (MjInfer.__init__)
    # Maximum motor velocity limit (rad/s) for rate limiting joint commands (self.max_motor_velocity)
    max_motor_velocity: 5.24
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py (MjInfer.__init__ + get_obs)
    # Joint velocity scaling factor for observation (dof_vel_scale): obs includes (joint_vel * dof_vel_scale)
    dof_vel_scale: 0.05

    # Reference motion blending
    # Weight for blending RL actions with smoothed reference motion (0.0-1.0)
    # 0.0 = disabled (no reference motion blending), 1.0 = full reference motion
    # Default: 0.2 (20% reference motion, 80% RL action)
    # Note: Python code path does not implement this feature
    reference_motion_blend_factor: 0.0

    # Default joint positions (init_pos) for relative position calculation
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/xmls/scene_flat_terrain.xml
    # Extracted from keyframe("home").ctrl values (lines 59-74)
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer_base.py lines 121-123
    # Order matches joints list above: left leg (5), head (4), right leg (5)
    # IMPORTANT: These define the standing pose when velocity = 0
    # Values: [left_hip_yaw, left_hip_roll, left_hip_pitch, left_knee, left_ankle,
    #          neck_pitch, head_pitch, head_yaw, head_roll,
    #          right_hip_yaw, right_hip_roll, right_hip_pitch, right_knee, right_ankle]
    default_joint_positions: [0.002, 0.053, -0.63, 1.368, -0.784, 0.0, 0.0, 0.0, 0.0, -0.003, -0.065, 0.635, 1.379, -0.796]

    # Default actuator values (default_actuator) used to initialize motor targets at startup.
    # Value source (MuJoCo model): keyframe "home" ctrl, e.g.
    # Open_Duck_Playground/playground/open_duck_mini_v2/xmls/scene_flat_terrain.xml (<key name="home" ctrl="...">)
    # Consumption (Python sim): Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer_base.py
    # sets default_actuator = model.keyframe("home").ctrl, and motor_targets/prev_motor_targets = default_actuator.
    default_actuator: [0.002, 0.053, -0.63, 1.368, -0.784, 0.0, 0.0, 0.0, 0.0, -0.003, -0.065, 0.635, 1.379, -0.796]

    # Head joint indices (receive additional head commands from velocity_commands[3:7])
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py lines 147-150
    # Head commands are set via commands[3:7] for neck_pitch, head_pitch, head_yaw, head_roll
    # Indices correspond to joints list: neck_pitch (5), head_pitch (6), head_yaw (7), head_roll (8)
    head_joint_indices: [5, 6, 7, 8]

    # IMU sensor configuration
    # Source: ros2_control xacro open_duck_mini.ros2_control.xacro sensor name "imu"
    # Sensor name matches MuJoCo site name in open_duck_mini_v2.xml
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer_base.py line 110    # Controller for data collection: accepts joint position commands
    # Used by collect_ros2_data.py to publish reference motion actions
    imu_sensor_name: "imu"
    # MuJoCo accelerometer reports negative z when standing (ground pushes down in sensor frame)
    # Set to false to not invert z-axis to match expected +9.8 m/s² for standing robot
    imu_upside_down: false

    # Debug: Force alternating contacts to test if constant contacts are cause of robot not moving
    # If true, overrides real contact sensor values with alternating pattern [1.0,0.0] <-> [0.0,1.0] every 25 steps
    force_alternating_contacts: false

    # Control state parameters
    # Source: Default value (not explicitly set in Playground mujoco_infer.py)
    start_paused: false

    # Training control period (CRITICAL: Must match controller_manager update_rate)
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer_base.py
    # Training uses: sim_dt * decimation = 0.002 * 10 = 0.02s (50Hz)
    # IMPORTANT: This value MUST match the controller_manager update_rate period
    #   - controller_manager update_rate: 50 Hz = 0.02s period
    #   - training_control_period: 0.02s
    # If these don't match, the controller will warn about period mismatch
    # Mismatched periods cause incorrect phase/gait timing and motor velocity limits
    # The controller validates this at runtime and logs warnings if period differs by >1ms
    training_control_period: 0.02

    # Gait phase parameters
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py line 60
    # phase_frequency_factor initialized to 1.0, offset set to 0.0 for default behavior
    phase_frequency_factor_offset: 0.0
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py lines 176-197
    # Phase period calculated from PRM.nb_steps_in_period (reference motion polynomial)
    # Default value set to 100.0 for compatibility
    phase_period: 100.0

    # Action filtering
    # Source: Open_Duck_Playground/playground/open_duck_mini_v2/mujoco_infer.py line 33
    # Low-pass filter: LowPassActionFilter(50, cutoff_frequency=37.5)
    # Note: Filter is created but not actively used (commented out in line 205-206)
    # Setting to 37.5 to match Playground configuration
    cutoff_frequency: 37.5

forward_command_controller:
  ros__parameters:
    # Direct joint-position command controller (writes to each joint's `position` command interface).
    # Useful for data collection / trajectory replay (e.g. collect_ros2_data.py) and scripted motion in simulation.
    type: forward_command_controller/ForwardCommandController
    joints:
      - left_hip_yaw
      - left_hip_roll
      - left_hip_pitch
      - left_knee
      - left_ankle
      - neck_pitch
      - head_pitch
      - head_yaw
      - head_roll
      - right_hip_yaw
      - right_hip_roll
      - right_hip_pitch
      - right_knee
      - right_ankle
    interface_name: position
