locomotion_controller:
  joints: {
    type: string_array,
    description: "Names of the joints to control",
    validation: {
      not_empty<>: []
    },
    read_only: true
  }
  model_path: {
    type: string,
    description: "Path to the ML model file (e.g., ONNX model)",
    validation: {
      not_empty<>: []
    },
    read_only: true
  }
  interfaces_broadcaster_topic: {
    type: string,
    default_value: "interfaces_state_broadcaster/values",
    description: "Topic name from interfaces_state_broadcaster"
  }
  velocity_command_topic: {
    type: string,
    default_value: "~/cmd_vel",
    description: "Topic name for velocity commands (geometry_msgs/Twist)"
  }
  action_scale: {
    type: double,
    default_value: 0.25,
    description: "Scale factor for model outputs (default: 0.25 from env_cfg.py)"
  }
  default_joint_positions: {
    type: double_array,
    default_value: [],
    description: "Default joint positions for action offset. If empty or size mismatch, will be initialized from sensor data on first update."
  }
  imu_sensor_name: {
    type: string,
    default_value: "imu_2",
    description: "Name of the IMU sensor to use for base angular velocity and projected gravity vector"
  }
